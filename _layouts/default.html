<!DOCTYPE html>
<html lang="zh-TW" class="scroll-smooth">
<head>
    {% include head.html %}
</head>
<body class="antialiased bg-light font-sans-tc text-secondary flex flex-col min-h-screen">
    {% include nav.html %}

    <main class="flex-grow pt-24 md:pt-28 pb-20">
        {{ content }}
    </main>

    {% include footer.html %}

    <script>
        lucide.createIcons();

        // 行動版選單開合（沿用主站的 max-h/opacity 過場作法）
        const menuToggle = document.getElementById('menu-toggle');
        const mobileDropdown = document.getElementById('mobile-dropdown');
        if (menuToggle && mobileDropdown) {
            menuToggle.addEventListener('click', () => {
                const isOpen = mobileDropdown.classList.contains('max-h-60');
                mobileDropdown.classList.toggle('max-h-60', !isOpen);
                mobileDropdown.classList.toggle('opacity-100', !isOpen);
                mobileDropdown.classList.toggle('max-h-0', isOpen);
                mobileDropdown.classList.toggle('opacity-0', isOpen);
            });
        }

        // --- QR Code Modal（與主站 js/script.js 相同）---
        const qrModal = document.getElementById('qr-modal');
        const qrCard = qrModal ? qrModal.querySelector('div') : null;

        window.openQRModal = () => {
            if (!qrModal) return;
            qrModal.classList.remove('invisible', 'opacity-0');
            if (qrCard) {
                qrCard.classList.remove('scale-95');
                qrCard.classList.add('scale-100');
            }
            document.body.style.overflow = 'hidden';
        };

        window.closeQRModal = () => {
            if (!qrModal) return;
            qrModal.classList.add('invisible', 'opacity-0');
            if (qrCard) {
                qrCard.classList.remove('scale-100');
                qrCard.classList.add('scale-95');
            }
            document.body.style.overflow = '';
        };

        if (qrModal) {
            qrModal.addEventListener('click', (e) => {
                if (e.target === qrModal) closeQRModal();
            });
        }
    </script>
</body>
</html>
