---
layout: default
---
<article class="container mx-auto px-6">
    <div class="max-w-3xl mx-auto">
        <header class="mb-10">
            <p class="text-xs text-accent tracking-[0.15em] font-sans-tc mb-3">{{ page.date | date: "%Y 年 %-m 月 %-d 日" }}</p>
            <h1 class="font-serif-tc font-bold text-3xl md:text-4xl text-primary leading-snug mb-4">{{ page.title }}</h1>
            {% if page.description %}
            <p class="text-secondary font-light">{{ page.description }}</p>
            {% endif %}
            {% if page.tags.size > 0 %}
            <div class="flex flex-wrap gap-2 mt-5">
                {% for tag in page.tags %}
                <a href="{{ '/tags/' | relative_url }}#{{ tag }}"
                   class="text-xs px-3 py-1 rounded-full bg-white text-accent border border-[#E5E0D8] hover:bg-deco hover:text-primary transition-colors tracking-wide">{{ tag }}</a>
                {% endfor %}
            </div>
            {% endif %}
        </header>

        {% if page.image %}
        <img src="{{ page.image | relative_url }}" alt="{{ page.title }}" class="w-full rounded-sm shadow-lg mb-10">
        {% endif %}

        <div class="prose-tc text-secondary">
            {{ content }}
        </div>

        <footer class="mt-16 pt-8 border-t border-[#E5E0D8]">
            <a href="{{ '/' | relative_url }}" class="inline-flex items-center gap-2 text-sm text-accent hover:text-primary transition-colors tracking-widest font-sans-tc">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> 回到文章列表
            </a>
        </footer>
    </div>
</article>
