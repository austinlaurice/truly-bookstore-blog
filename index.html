---
layout: default
---
<div class="container mx-auto px-6">
    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-12">
            <h1 class="font-serif-tc font-bold text-3xl md:text-4xl text-primary mb-3">真的書店 Blog</h1>
            <p class="text-accent text-sm tracking-[0.15em] font-sans-tc">選書筆記・店內活動・閱讀日常</p>
        </header>

        <div class="mb-10 max-w-xl mx-auto">
            <div class="relative">
                <i data-lucide="search" class="w-4 h-4 text-accent absolute left-4 top-1/2 -translate-y-1/2"></i>
                <input id="search-input" type="search" placeholder="搜尋文章標題、標籤或摘要…"
                       class="w-full pl-11 pr-4 py-3 rounded-full bg-white border border-[#E5E0D8] text-sm text-primary placeholder:text-accent/70 focus:outline-none focus:border-deco focus:ring-2 focus:ring-deco/40 transition-all font-sans-tc">
            </div>
        </div>

        <ul id="post-list" class="flex flex-col gap-6">
            {% for post in site.posts %}
            {% include post-card.html post=post %}
            {% endfor %}
        </ul>

        <p id="search-empty" class="hidden text-center text-accent py-16 font-light">
            找不到符合的文章，換個關鍵字試試？
        </p>

        {% if site.posts.size == 0 %}
        <p class="text-center text-accent py-16 font-light">還沒有文章，敬請期待。</p>
        {% endif %}
    </div>
</div>

<script src="{{ '/assets/js/search.js' | relative_url }}" defer></script>
